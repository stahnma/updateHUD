<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Updates</title>
    <link rel="stylesheet" href="/static/styles.css">
    <script src="/static/app.js" defer></script>
</head>
<body>
    <h1>System Updates</h1>
    <table>
        <thead>
            <tr>
                <th></th> <!-- For the chevron toggle -->
                <th class="sortable" data-column="hostname">Hostname</th>
                <th class="sortable" data-column="os">OS</th>
                <th class="sortable" data-column="architecture">Architecture</th>
                <th class="sortable" data-column="ip">IP Address</th>
                <th class="sortable" data-column="updates_available">Updates Available</th>
                <th class="sortable" data-column="last_seen">Last Seen</th>
            </tr>
        </thead>
        <tbody id="systems">
            <!-- Rows will be dynamically rendered -->
        </tbody>
    </table>
</body>
</html>
