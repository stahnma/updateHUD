<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Updates</title>
    <script>
        // Apply theme immediately to prevent flash of unstyled content
        (function() {
            const theme = localStorage.getItem('muc-theme') ||
                (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
            if (theme === 'light') {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>
    <link rel="stylesheet" href="/static/styles.css">
    <script src="/static/theme.js" defer></script>
    <script src="/static/app.js?v=3" defer></script>
     <script defer>
        document.addEventListener('DOMContentLoaded', () => {
            const table = document.querySelector('table');
            const headers = table.querySelectorAll('th');

            headers.forEach((header, index) => {
                if (index === 0) return; // Skip the first column (chevron toggle)

                let ascending = true;

                header.addEventListener('click', () => {
                    const rows = Array.from(table.querySelectorAll('tbody tr'));

                    rows.sort((rowA, rowB) => {
                        const cellA = rowA.children[index].textContent.trim();
                        const cellB = rowB.children[index].textContent.trim();

                        if (!isNaN(cellA) && !isNaN(cellB)) {
                            return ascending ? cellA - cellB : cellB - cellA;
                        }

                        return ascending
                            ? cellA.localeCompare(cellB)
                            : cellB.localeCompare(cellA);
                    });

                    ascending = !ascending;

                    rows.forEach(row => table.querySelector('tbody').appendChild(row));

                    headers.forEach(h => h.classList.remove('ascending', 'descending'));
                    header.classList.add(ascending ? 'ascending' : 'descending');
                });
            });
        });
    </script>
</head>
<body>
    <button id="theme-toggle-btn" class="theme-toggle" aria-label="Switch theme">☀️</button>
    <h1>System Updates</h1>
    <div class="controls">
        <button id="expand-all-btn">Expand All</button>
        <button id="collapse-all-btn">Collapse All</button>
    </div>
    <table>
        <thead>
            <tr>
                <th></th> <!-- For the chevron toggle -->
                <th class="sortable" data-column="hostname">Hostname</th>
                <th class="sortable" data-column="os">OS</th>
                <th class="sortable" data-column="architecture">Architecture</th>
                <th class="sortable" data-column="ip">IP Address</th>
                <th class="sortable" data-column="updates_available">Updates Available</th>
                <th class="sortable" data-column="last_seen">Last Seen</th>
            </tr>
        </thead>
        <tbody id="systems">
            <!-- Rows will be dynamically rendered -->
        </tbody>
    </table>
    <footer class="floating-footer">
        <a href="/">Home</a>
        <span class="separator">|</span>
        <a href="https://github.com/stahnma/muc" target="_blank" rel="noopener noreferrer">GitHub Source</a>
        <span class="separator">|</span>
        <a href="/apidoc">API Documentation</a>
    </footer>
</body>
</html>
